services:
  postgres:
    image: postgres:16
    container_name: online_store_postgres
    environment:
      POSTGRES_DB: online_store_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - online_store_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d online_store_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online_store_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/online_store_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: my-super-secret-key-my-super-secret-key-123456
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8081:8080"

volumes:
  online_store_postgres_data: